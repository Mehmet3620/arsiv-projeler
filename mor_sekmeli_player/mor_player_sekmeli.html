    <meta charset="UTF-8">

    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .player-card { 
            width: 380px; height: 600px; 
            background: linear-gradient(180deg, #6a5acd 0%, #2e1a47 100%);
            border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; background: rgba(0,0,0,0.2); }
        .tabs { display: flex; gap: 5px; padding: 10px; background: rgba(0,0,0,0.1); overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; white-space: nowrap; min-width: 55px; }
        .tab-btn.active { background: #fff; color: #4b0082; border-color: #fff; font-weight: bold; }
        .content-area { flex: 1; overflow-y: auto; padding: 5px; position: relative; }
        .item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .item:hover { background: rgba(255,255,255,0.1); }
        .item.playing { background: rgba(255,255,255,0.2); border-left: 3px solid #fff; }
        .album-art { width: 45px; height: 45px; background: #333; border-radius: 6px; margin-right: 12px; overflow: hidden; flex-shrink: 0; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex: 1; color: white; overflow: hidden; }
        .info b { font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info small { font-size: 10px; color: #ccc; }
        .meta { text-align: right; color: #fff; font-size: 10px; min-width: 60px; opacity: 0.9; }
        .about-box { padding: 20px; color: #fff; text-align: center; line-height: 1.6; }
        .footer-player { height: 85px; background: linear-gradient(90deg, #7b68ee, #4b0082); display: flex; align-items: center; padding: 0 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .controls { display: flex; gap: 6px; align-items: center; }
        .btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; background: rgba(0,0,0,0.3); color: white; display: flex; align-items: center; justify-content: center; }
        .play { background: white; color: #4b0082; width: 40px; height: 40px; font-size: 18px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 10px; }
    </style>
</head>

    <header><span>❮</span><strong>Müzik & Şiir Arşivi</strong><span>🔍</span></header>
    <div class="tabs">
        <button class="tab-btn active" onclick="changeTab('slow', this)">Slow</button>
        <button class="tab-btn" onclick="changeTab('pop', this)">Pop</button>
        <button class="tab-btn" onclick="changeTab('arabesk', this)">Arabesk</button>

        <button class="tab-btn" onclick="changeTab('about', this)">❓</button>
    </div>
    <div class="content-area" id="main-list"></div>
    <div class="footer-player">
        <div class="album-art" style="width:50px; height:50px;"><img src="" id="curr-img" style="display:none;"><span id="def-icon">🎵</span></div>
        <div class="info" style="margin-left:10px;"><b id="curr-title">Parça Seçin</b><small id="curr-artist">Müzik Listesi</small></div>
        <div class="controls">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn play" id="p-btn" onclick="togglePlay()">▶</button>
            <button class="btn" onclick="next()">⏭</button>

    </div>
    <audio id="player"></audio>

    let currentCategory = 'slow';
    let currentIndex = -1;
    const audio = document.getElementById('player');
    const pBtn = document.getElementById('p-btn');

    function render(cat) {
        currentCategory = cat;
        const listDiv = document.getElementById('main-list');
        if(cat === 'about') {
            listDiv.innerHTML = `<div class="about-box"><h3>Hakkında</h3><p><b>Yapımcı:</b> Seyyah20</p><p><b>Widget:</b> Müzik & Şiir Arşivi v3.0</p><p><b>Tarih:</b> 2026</p><p>Bu player Seyyah20 tarafından Allaturkaa forum kullanıcıları için özel olarak tasarlanmıştır.</p></div>`;
            return;
        }
        listDiv.innerHTML = songData[cat].map((s, index) => `
            <div class="item ${currentIndex === index && currentCategory === cat ? 'playing' : ''}" onclick="load(${index})">
                <div class="album-art"><img src="${s.img}"></div>
                <div class="info"><b>${s.t}</b><small>${s.a}</small></div>
                <div class="meta">${s.d}<br>${s.s}</div>
            </div>`).join('');
    }

    function changeTab(cat, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(cat);
    }

    function load(index) {
        currentIndex = index;
        const song = songData[currentCategory][currentIndex];
        document.getElementById('curr-title').innerText = song.t;
        document.getElementById('curr-artist').innerText = song.a;
        const img = document.getElementById('curr-img');
        img.src = song.img; img.style.display = 'block';
        document.getElementById('def-icon').style.display = 'none';
        audio.src = song.url;
        if(song.url !== "#") { audio.play(); pBtn.innerText = "⏸"; }
        render(currentCategory);
    }

    function togglePlay() {
        if(!audio.src || audio.src.includes('#')) return;
        audio.paused ? (audio.play(), pBtn.innerText="⏸") : (audio.pause(), pBtn.innerText="▶");
    }

    function next() {
        let nIdx = (currentIndex + 1) % songData[currentCategory].length;
        load(nIdx);
    }

    function prev() {
        let pIdx = (currentIndex - 1 + songData[currentCategory].length) % songData[currentCategory].length;
        load(pIdx);
    }

    audio.onended = next;
    render('slow');
</script>
