<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Kanit:wght@900&family=Anton&family=Righteous&family=Bebas+Neue&family=Titan+One&family=Staatliches&family=Archivo+Black&family=Paytone+One&family=Racing+Sans+One&family=Passion+One:wght@900&family=Fredoka+One&family=Luckiest+Guy&family=Permanent+Marker&family=Bungee+Inline&family=Lobster&family=Pacifico&family=Faster+One&family=Fascinate+Inline&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style id="main-styles">
    :root { --bg: #0b0e14; --card: #151921; --accent: #facc15; }
    body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; padding: 40px 20px; }
    .generator-panel { background: var(--card); border: 1px solid #222; border-radius: 30px; padding: 40px; width: 100%; max-width: 1250px; margin: 0 auto; box-shadow: 0 20px 50px #000; }
    .header-title { text-align: center; margin-bottom: 40px; color: var(--accent); font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; }
    .controls-row { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border: 1px solid #2d333b; margin-bottom: 30px; }
    .style-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin-top: 25px; }
    .style-card { background: #0d1117; border: 1px solid #30363d; padding: 12px 2px; border-radius: 10px; cursor: pointer; text-align: center; font-size: 11px; font-weight: bold; color: #8b949e; transition: 0.3s; }
    .style-card.active { border-color: var(--accent); background: #1c2128; color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(250,204,21,0.2); }
    #preview-box { background: #000; border: 2px dashed #333; border-radius: 25px; min-height: 220px; display: flex; align-items: center; justify-content: center; margin-top: 30px; overflow: hidden; }
    #export-area { padding: 30px; display: inline-block; background: transparent !important; }
    #target { font-size: 75px; line-height: 1.1; white-space: nowrap; font-weight: 900; }
    .action-btn { font-family: 'Orbitron'; font-weight: 900; border-radius: 12px; padding: 15px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
    .btn-png { background: #10b981; color: white; }
    .btn-code { background: #6366f1; color: white; }

    /* --- HER BİRİ TAMAMEN FARKLI 40 STİL --- */
    .s1 { color: #facc15; text-shadow: 3px 3px 0 #8b4500, 6px 6px 0 #000; }
    .s2 { color: #00d4ff; text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 3px 3px 0 #000; }
    .s3 { color: #ff3e3e; text-shadow: 2px 2px 0 #8b0000, 4px 4px 0 #440000, 6px 6px 10px #000; }
    .s4 { color: #fff; -webkit-text-stroke: 2px #333; text-shadow: 4px 4px 0 #facc15, 7px 7px 0 #000; }
    .s5 { color: #00ff41; text-shadow: 0 0 15px #00ff41, 3px 3px 0 #000; }
    .s6 { background: linear-gradient(to bottom, #ffffff, #777777); -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; filter: drop-shadow(4px 4px 0px #000); }
    .s7 { color: #ff8800; text-shadow: 2px 2px 0 #5c2e00, 4px 4px 15px rgba(255,136,0,0.5); }
    .s8 { color: #1e90ff; text-shadow: 3px 3px 0 #00008b, 5px 5px 0 #000; }
    .s9 { color: #d4d4d4; text-shadow: -2px -2px 0 #fff, 2px 2px 0 #444, 5px 5px 15px #000; }
    .s10 { color: #facc15; text-shadow: 0 4px 0 #5c4400, 0 8px 0 #333, 0 12px 10px #000; }
    .s11 { color: #ff00de; text-shadow: 0 0 10px #ff00de, 3px 3px 0 #000; }
    .s12 { color: #fff; text-shadow: 4px 4px 0 #ff0000, -4px -4px 0 #00ffff; }
    .s13 { color: #adff2f; text-shadow: 2px 2px 0 #006400, 4px 4px 0 #000; }
    .s14 { color: #8b4513; text-shadow: 2px 2px #e1ca96, 4px 4px 0 #222; }
    .s15 { color: #e5e7eb; text-shadow: 0 1px 0 #9ca3af, 0 2px 0 #6b7280, 0 5px 10px #000; }
    .s16 { color: #fbbf24; text-shadow: 1px 1px 0 #b45309, 3px 3px 0 #78350f, 5px 5px 0 #000; }
    .s17 { color: #10b981; text-shadow: 0 0 10px #34d399, 3px 3px 0 #064e3b; }
    .s18 { color: #6366f1; text-shadow: 2px 2px 0 #312e81, 4px 4px 0 #1e1b4b; }
    .s19 { color: #f87171; text-shadow: 2px 2px 0 #7f1d1d, 5px 5px 10px #000; }
    .s20 { color: #fff; text-shadow: 0 0 5px #fff, 0 0 20px #facc15, 0 0 40px #facc15; }
    .s21 { color: #2dd4bf; text-shadow: 3px 3px 0 #134e4a, 5px 5px 0 #000; }
    .s22 { color: #a855f7; text-shadow: 2px 2px 0 #581c87, 4px 4px 10px #000; }
    .s23 { color: #ec4899; text-shadow: 2px 2px 0 #831843, 0 0 15px #ec4899; }
    .s24 { color: #fff; -webkit-text-stroke: 1px #444; text-shadow: 2px 2px 0 #ccc, 4px 4px 0 #888, 6px 6px 0 #000; }
    .s25 { color: #facc15; text-shadow: -2px -2px 0 #fff, 2px 2px 0 #8b4500, 4px 4px 10px #000; }
    .s26 { color: #06b6d4; text-shadow: 2px 2px 0 #164e63, 0 0 20px #06b6d4; }
    .s27 { color: #ef4444; text-shadow: 0 4px 0 #7f1d1d, 0 8px 15px rgba(0,0,0,0.5); }
    .s28 { color: #10b981; text-shadow: 2px 2px 0 #064e3b, 4px 4px 0 #000; }
    .s29 { color: #f59e0b; text-shadow: 3px 3px 0 #78350f, 6px 6px 15px #000; }
    .s30 { color: #fff; text-shadow: 1px 1px 0 #ff0000, 2px 2px 0 #ff7f00, 3px 3px 0 #ffff00, 4px 4px 0 #00ff00, 5px 5px 0 #0000ff; }
    .s31 { color: #94a3b8; text-shadow: 2px 2px 0 #1e293b, 4px 4px 0 #000; }
    .s32 { color: #4ade80; text-shadow: 0 0 10px #166534, 3px 3px 0 #052e16; }
    .s33 { color: #fb7185; text-shadow: 2px 2px 0 #881337, 4px 4px 0 #000; }
    .s34 { color: #38bdf8; text-shadow: 2px 2px 0 #075985, 5px 5px 10px #000; }
    .s35 { color: #fb923c; text-shadow: 3px 3px 0 #7c2d12, 5px 5px 0 #000; }
    .s36 { color: #818cf8; text-shadow: 2px 2px 0 #3730a3, 0 0 15px #818cf8; }
    .s37 { color: #fff; text-shadow: 3px 3px 0 #444, 6px 6px 0 #888, 9px 9px 0 #000; }
    .s38 { color: #fde047; text-shadow: 2px 2px 0 #854d0e, 0 0 20px #facc15; }
    .s39 { color: #22c55e; text-shadow: 2px 2px 0 #14532d, 4px 4px 0 #052e16; }
    .s40 { color: #0ea5e9; text-shadow: 3px 3px 0 #0c4a6e, 6px 6px 20px #000; }

    .m3620-footer { margin-top: 50px; padding: 25px; border-top: 1px solid #222; text-align: center; font-size: 13px; color: #444; letter-spacing: 3px; }
  </style>
</head>
<body>

<div class="generator-panel">
  <h1 class="header-title">SEYYAH20 INDEX MASTER</h1>
  <div class="controls-row">
    <div class="row g-4 align-items-center">
      <div class="col-md-6"><input type="text" id="inp" class="form-control bg-dark text-white border-secondary p-3" oninput="draw()" value="ANA SAYFA"></div>
      <div class="col-md-3"><button class="action-btn btn-png" onclick="savePng()">🖼️ PNG KAYDET</button></div>
      <div class="col-md-3"><button class="action-btn btn-code" onclick="getFullCode()">💻 KOD AL</button></div>
    </div>
  </div>
  <div class="style-grid" id="styleGrid"></div>
  <div id="preview-box"><div id="export-area"><span id="target" class="s1">ANA SAYFA</span></div></div>
  <div id="out-box" class="mt-4" style="display:none;"><textarea id="res-code" class="form-control bg-dark text-info" rows="8" readonly style="font-size:12px; font-family: monospace;"></textarea></div>
  <div class="m3620-footer">SEYYAH20 WEB DESIGN STUDIO</div>
</div>

<script>
  const styles = [
    ['s1','Anton','GOLD 3D'],['s2','Orbitron','CYAN GLOW'],['s3','Kanit','RED SOLID'],['s4','Staatliches','WHITE STROKE'],['s5','Righteous','MATRIX'],['s6','Archivo Black','SILVER'],['s7','Titan One','ORANGE'],['s8','Bebas Neue','BLUE SHADOW'],['s15','Paytone One','GREY 3D'],['s10','Racing Sans+One','GOLD DEPTH'],
    ['s11','Pacifico','PINK NEON'],['s12','Luckiest+Guy','GLITCH'],['s13','Bungee+Inline','LIME'],['s14','Lobster','WOOD'],['s9','Staatliches','SOFT METAL'],['s16','Anton','AMBER'],['s17','Righteous','EMERALD'],['s18','Kanit','INDIGO'],['s19','Bebas Neue','CORAL'],['s20','Orbitron','SUN GLOW'],
    ['s21','Staatliches','TEAL'],['s22','Titan One','PURPLE'],['s23','Pacifico','MAGENTA'],['s24','Archivo Black','STACKED'],['s25','Luckiest+Guy','ROYAL'],['s26','Racing Sans+One','SKY'],['s27','Anton','DANGER'],['s28','Kanit','FOREST'],['s29','Paytone One','HONEY'],['s30','Bebas Neue','RAINBOW'],
    ['s31','Righteous','SLATE'],['s32','Fredoka+One','LEAF'],['s33','Staatliches','ROSE'],['s34','Racing Sans+One','OCEAN'],['s35','Anton','VOLCANO'],['s36','Kanit','LAVENDER'],['s37','Archivo Black','OFFSET'],['s38','Titan One','LEMON'],['s39','Righteous','GRASS'],['s21','Engagement','ENGAMET'],
	['s32','Caramel','CARAMEL'],['s32','Dancing Script','DANCİNG'],['s32','Bungee','BUNGEE'],['s32','Lobster','LOBSTER'],['s32','Redressed','REDRESSED'],['s32','Stick No Bills','BİLLS'],['s22','New Rocker','ROCKER'],['s28','Anta','ANTA'],['s16','Sancreek','SANCREK'],['s40','Orbitron','DEEP SEA']
  ];

  let curFont = 'Anton';

  function loadFont(f) {
    const id = 'f-' + f.replace(/\s+/g, '-');
    if (!document.getElementById(id)) {
        const l = document.createElement('link'); l.id = id; l.rel = 'stylesheet';
        l.href = `https://fonts.googleapis.com/css2?family=${f.replace(/ /g, '+')}:wght@400;700;900&display=swap`;
        document.head.appendChild(l);
    }
  }

  function initGrid() {
    const g = document.getElementById('styleGrid');
    styles.forEach((s, i) => {
      const b = document.createElement('div');
      b.className = 'style-card' + (i === 0 ? ' active' : '');
      b.innerText = s[2];
      b.onclick = () => {
        loadFont(s[1]);
        document.querySelectorAll('.style-card').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); curFont = s[1];
        document.getElementById('target').className = s[0]; draw();
      };
      g.appendChild(b);
    });
  }

  function draw() {
    const t = document.getElementById('target');
    t.innerText = document.getElementById('inp').value || 'ANA SAYFA';
    t.style.setProperty('font-family', `'${curFont}'`, 'important');
  }

  function savePng() {
    html2canvas(document.querySelector("#export-area"), { backgroundColor: null, scale: 2, useCORS: true }).then(c => {
      let l = document.createElement('a'); l.download = 'm3620_pro.png'; l.href = c.toDataURL(); l.click();
    });
  }

  function getFullCode() {
    const t = document.getElementById('target');
    const cssText = document.getElementById('main-styles').innerHTML.match(new RegExp(`\\.${t.className}\\s*{[^}]*}`, 'g'))[0];
    const fontUrl = `https://fonts.googleapis.com/css2?family=${curFont.replace(/ /g, '+')}:wght@900&display=swap`;
    const area = document.getElementById('res-code');
    area.value = `<link href="${fontUrl}" rel="stylesheet">\n<style>${cssText}</style>\n<div class="${t.className}" style="font-family:'${curFont}'; font-size:40px;">${t.innerText}</div>`;
    document.getElementById('out-box').style.display = 'block';
  }

  initGrid();
  loadFont('Anton');
</script>
</body>
</html>
